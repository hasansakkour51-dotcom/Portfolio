    <script>
      AOS.init({
        duration: 1200,
        once: true,
      });
    </script>

    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>

    <script>
      emailjs.init("YOUR_PUBLIC_KEY");

      const form = document.getElementById("contactForm");
      const toast = document.getElementById("toast");

      function showToast(message, type = "success") {
        toast.textContent = message;
        toast.className = type === "error" ? "show error" : "show";
        setTimeout(
          () => (toast.className = toast.className.replace("show", "")),
          3000
        );
      }

      function validate() {
        let valid = true;

        const name = document.getElementById("name");
        const email = document.getElementById("email");
        const message = document.getElementById("message");

        const fields = [name, email, message];

        fields.forEach((field) => {
          const error = field.nextElementSibling;
          if (!field.value.trim()) {
            error.textContent = "This field is required";
            error.style.display = "block";
            valid = false;
          } else {
            error.style.display = "none";
          }
        });

        // Email format check
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (email.value && !emailPattern.test(email.value)) {
          email.nextElementSibling.textContent = "Invalid email format";
          email.nextElementSibling.style.display = "block";
          valid = false;
        }

        return valid;
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        if (!validate()) {
          showToast("Please fix the errors", "error");
          return;
        }

        // Show loader
        document.querySelector(".btn-text").style.display = "none";
        document.querySelector(".loader").style.display = "inline-block";

        emailjs
          .sendForm("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", form)
          .then(() => {
            showToast("Message sent successfully!");
            form.reset();
            form.classList.add("success-animate");

            setTimeout(() => form.classList.remove("success-animate"), 500);
          })
          .catch(() => {
            showToast("Failed to send message", "error");
          })
          .finally(() => {
            document.querySelector(".btn-text").style.display = "inline";
            document.querySelector(".loader").style.display = "none";
          });
      });
    </script>

    <script type="module" src="./js/main.js"></script>
    <script src="./js/translate.js"></script>
  </body>
