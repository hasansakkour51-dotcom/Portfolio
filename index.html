    <style>
      /* Loader Styles */
      .loaderWrapper {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }
      .spinner {
        width: 60px;
        height: 60px;
        border: 6px solid #ccc;
        border-top: 6px solid #ffcc00;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .loaderText {
        margin-top: 1rem;
        color: #fff;
        font-size: 1.2rem;
        font-weight: bold;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <!-- Loader -->
    <div id="globalLoader" class="loaderWrapper">
      <div class="spinner"></div>
      <p class="loaderText">Loading...</p>
    </div>

    <header id="header"></header>
    <section id="hero"></section>
    <section id="about"></section>
    <section id="services"></section>
    <section id="skills" class="py-5"></section>
    <section id="latestProject"></section>
    <section id="Recommendation"></section>

    <section id="contact"></section>
    <section id="footer"></section>

    <!-- AOS JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>

    <script>
      AOS.init({
        duration: 1200,
        once: true,
      });

      // Loader fix: show at start, hide after page load
      const loader = document.getElementById("globalLoader");
      window.addEventListener("load", () => {
        loader.classList.add("hidden");
      });
    </script>

    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>

    <script>
      emailjs.init("YOUR_PUBLIC_KEY");

      const form = document.getElementById("contactForm");
      const toast = document.getElementById("toast");

      function showToast(message, type = "success") {
        toast.textContent = message;
        toast.className = type === "error" ? "show error" : "show";
        setTimeout(
          () => (toast.className = toast.className.replace("show", "")),
          3000
        );
      }

      function validate() {
        let valid = true;

        const name = document.getElementById("name");
        const email = document.getElementById("email");
        const message = document.getElementById("message");

        const fields = [name, email, message];

        fields.forEach((field) => {
          const error = field.nextElementSibling;
          if (!field.value.trim()) {
            error.textContent = "This field is required";
            error.style.display = "block";
            valid = false;
          } else {
            error.style.display = "none";
          }
        });

        const emailPattern = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;
        if (email.value && !emailPattern.test(email.value)) {
          email.nextElementSibling.textContent = "Invalid email format";
          email.nextElementSibling.style.display = "block";
          valid = false;
        }

        return valid;
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        if (!validate()) {
          showToast("Please fix the errors", "error");
          return;
        }

        // Show loader
        loader.classList.remove("hidden");

        emailjs
          .sendForm("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", form)
          .then(() => {
            showToast("Message sent successfully!");
            form.reset();
            form.classList.add("success-animate");
            setTimeout(() => form.classList.remove("success-animate"), 500);
          })
          .catch(() => {
            showToast("Failed to send message", "error");
          })
          .finally(() => {
            loader.classList.add("hidden");
          });
      });
    </script>

    <script type="module" src="./js/main.js"></script>
    <script src="./js/translate.js"></script>
  </body>
