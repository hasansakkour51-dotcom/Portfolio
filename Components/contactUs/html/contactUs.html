<!-- SEO Keywords -->
<!-- keywords: contact me, frontend developer contact, hire developer, work together, hasan sakkour -->

<h1 class="sub-title pt-5">
  <span data-key="contact_title1">Contact</span>
  <span data-key="contact_title2">Me</span>
</h1>

<div class="container">
  <div class="row pb-5">
    <div class="contact-container">
      <!-- CONTACT INFO -->
      <div class="contact-info" data-aos="fade-right">
        <h2 data-key="contact_heading">Let's Work Together</h2>

        <p data-key="contact_desc">
          If you have a project in mind or just want to say hello, feel free to
          reach out.
        </p>

        <div class="info-item">
          <i class="fa-solid fa-envelope"></i>
          <span data-key="contact_email">hasansakkour0@gmail.com</span>
        </div>

        <div class="info-item">
          <i class="fa-solid fa-phone"></i>
          <span data-key="contact_phone">+963 99 2750 828</span>
        </div>

        <div class="info-item">
          <i class="fa-solid fa-location-dot"></i>
          <span data-key="contact_location">Syria, Damascus</span>
        </div>

        <div class="social-icons">
          <a href="#"><i class="fa-brands fa-github"></i></a>
          <a href="#"><i class="fa-brands fa-linkedin"></i></a>
          <a href="#"><i class="fa-brands fa-instagram"></i></a>
        </div>
      </div>

      <!-- CONTACT FORM -->
      <form class="contact-form" id="contactForm">
        <div class="input-box">
          <input
            type="text"
            name="name"
            id="name"
            placeholder="Your Name"
            data-key-placeholder="placeholder_name"
          />
          <small class="error-msg"></small>
        </div>

        <div class="input-box">
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Your Email"
            data-key-placeholder="placeholder_email"
          />
          <small class="error-msg"></small>
        </div>

        <div class="input-box">
          <textarea
            name="message"
            id="message"
            placeholder="Your Message"
            data-key-placeholder="placeholder_message"
          ></textarea>
          <small class="error-msg"></small>
        </div>

        <button type="submit" class="send-btn">
          <span class="btn-text" data-key="contact_btn">Send Message</span>
          <span class="loader"></span>
        </button>
      </form>

      <!-- TOAST NOTIFICATION -->
      <div id="toast"></div>
    </div>
  </div>
</div>
